<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merci — Impact-NVA</title>
  <meta name="description" content="Votre demande a bien été envoyée. Nous revenons vers vous sous 24 h ouvrées.">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#0A0F0C">

  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16.png">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="assets/css/style.css?v=6">

  <script>
    (function () {
      document.documentElement.classList.add('js');
      var saved = null;
      try { saved = localStorage.getItem('inva-theme'); } catch (e) {}
      var theme = saved || (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'jour' : 'nuit');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <style>
    .confirm-wrap {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1.4rem;
      position: relative;
      overflow: hidden;
    }
    .confirm-glow {
      position: absolute;
      inset: auto;
      top: 10%;
      left: 50%;
      transform: translateX(-50%);
      width: min(80vw, 700px);
      aspect-ratio: 1;
      background: radial-gradient(circle, var(--glow), transparent 62%);
      pointer-events: none;
    }
    .confirm-wrap img { height: 120px; width: auto; margin-bottom: 2rem; position: relative; }
    .confirm-check {
      width: 66px;
      height: 66px;
      border-radius: 50%;
      border: 1px solid var(--line-gold);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.6rem;
      color: var(--gold-text);
      position: relative;
    }
    .confirm-check svg { width: 30px; height: 30px; }
    .confirm-wrap h1 { font-size: clamp(2rem, 5vw, 2.9rem); letter-spacing: -0.015em; position: relative; }
    .confirm-wrap p { color: var(--ink-2); max-width: 46ch; position: relative; }
    .confirm-wrap .cta-button { margin-top: 1.6rem; position: relative; }
  </style>
</head>
<body>
  <main class="confirm-wrap">
    <div class="confirm-glow" aria-hidden="true"></div>
    <img src="assets/images/logo-impact.png" alt="Impact-NVA">
    <div class="confirm-check" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 12.5 9.5 17.5 19.5 7"/></svg>
    </div>
    <h1>Merci, votre demande est bien partie.</h1>
    <p>Nous revenons vers vous sous 24&nbsp;h ouvrées, généralement bien plus vite. D'ici là, pas besoin de faire quoi que ce soit&nbsp;: c'est nous qui jouons.</p>
    <a class="cta-button" href="index.html">Revenir au site</a>
  </main>
</body>
</html>
